[build]
  # DEPLOY_PRIME_URL is the production domain on production builds and the
  # preview address on deploy previews, so canonical and Open Graph tags point
  # at whichever site is actually being built.
  command = "VITE_SITE_URL=$DEPLOY_PRIME_URL npm run build"
  publish = "build"

# Serve index.html for unknown paths so client-side routes resolve
# instead of returning Netlify's 404 page.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Vite fingerprints filenames in assets/, so those are safe to cache forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
