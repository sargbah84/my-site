[build]
  # Default build keeps the canonical domain from .env. This site deploys from
  # the master branch, which Netlify treats as a branch deploy rather than a
  # production context, so DEPLOY_PRIME_URL would resolve to the branch address
  # and point the canonical tag away from the real domain.
  command = "npm run build"
  publish = "build"

# Only deploy previews describe themselves, so a shared preview link does not
# advertise the live site.
[context.deploy-preview]
  command = "VITE_SITE_URL=$DEPLOY_PRIME_URL npm run build"

# Serve index.html for unknown paths so client-side routes resolve
# instead of returning Netlify's 404 page.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Vite fingerprints filenames in assets/, so those are safe to cache forever.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
