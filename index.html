<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.json" />

    <title>Prince J. Sargbah | Full Stack Developer</title>
    <meta
      name="description"
      content="Prince J. Sargbah is a full stack developer based in Atlanta, GA, building with React, Laravel, Node.js and WordPress."
    />
    <meta name="author" content="Prince J. Sargbah" />
    <link rel="canonical" href="%VITE_SITE_URL%/" />

    <!-- Open Graph: Facebook, LinkedIn, Slack -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:title" content="Prince J. Sargbah | Full Stack Developer" />
    <meta
      property="og:description"
      content="Prince J. Sargbah is a full stack developer based in Atlanta, GA, building with React, Laravel, Node.js and WordPress."
    />
    <meta property="og:image" content="%VITE_SITE_URL%/avatar.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <!-- Declared so crawlers can lay the card out before fetching the image. -->
    <meta property="og:image:width" content="400" />
    <meta property="og:image:height" content="400" />
    <meta property="og:image:alt" content="Prince J. Sargbah" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Prince J. Sargbah | Full Stack Developer" />
    <meta
      name="twitter:description"
      content="Prince J. Sargbah is a full stack developer based in Atlanta, GA, building with React, Laravel, Node.js and WordPress."
    />
    <meta name="twitter:image" content="%VITE_SITE_URL%/avatar.jpg" />
    <meta name="twitter:image:alt" content="Prince J. Sargbah" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!--
      Netlify detects forms by scanning the deployed HTML at build time, and it
      cannot see markup that React renders at runtime. This hidden copy
      registers the form; the visible one lives in Contact.jsx and posts to it.
    -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="email" name="email" />
      <input type="text" name="name" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
